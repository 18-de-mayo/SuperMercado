spring.application.name=ms-catalogo
server.port=8083

# 1.
spring.datasource.url=jdbc:mysql://localhost:3306/catalogo?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# 3. Errores
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# 4. Feign
spring.cloud.openfeign.enabled=true

# 5. Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.flyway.baseline-on-migrate=true