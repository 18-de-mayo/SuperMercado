spring.application.name=pedidos

# Configuración de la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/pedidos?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=max2130
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
# 'none' delega el manejo del esquema completamente a Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway - Migraciones de base de datos
spring.flyway.enabled=true
spring.flyway.repair=true

# OpenFeing
api.productos.url=http://localhost:8081/api/v1/
api.clientes.url=http://localhost:8085/api/v1/

server.port=8084