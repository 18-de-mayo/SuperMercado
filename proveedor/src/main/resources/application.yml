server:
  port: 8082

spring:
  application:
    name: ms-proveedor
  datasource:
    url: jdbc:mysql://localhost:3306/proveedor_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  api-docs:
    path: /api/v1/proveedores-docs
  swagger-ui:
    path: /api/v1/proveedores-swagger

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
