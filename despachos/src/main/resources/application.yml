spring:
  profiles:
    active: dev
  application:
    name: ms-despacho

springdoc:
  api-docs:
    path: /api/v1/despachos-docs
  swagger-ui:
    path: /api/v1/despachos-swagger

---
# ─────────────────────────────────────────────────────────────────
# PERFIL DE DESARROLLO LOCAL (DEV)
# ─────────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/db_despachos?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8089

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

api:
  pedidos:
    url: http://localhost:8084
  proveedores:
    url: http://localhost:8082

logging:
  level:
    duoc.cl.despacho: INFO

---
# ─────────────────────────────────────────────────────────────────
# PERFIL DE PRODUCCIÓN / DOCKER (PROD)
# ─────────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:db_despachos}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8089

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

# CORRECCIÓN CRÍTICA: Mapeo directo a las variables inyectadas en tu Docker Compose
api:
  pedidos:
    url: ${API_PEDIDOS_URL:http://localhost:8084}
  proveedores:
    url: ${API_PROVEEDORES_URL:http://localhost:8082}