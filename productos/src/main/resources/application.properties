spring.application.name=ms-producto
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/db_productos?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA: Forzamos 'none' para que Hibernate no pelee con Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# 3. Flyway: Agregamos el baseline para mayor estabilidad
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration/productos

# 4. Errores y Feign
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
api.proveedores.url=http://localhost:8082