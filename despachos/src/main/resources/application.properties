spring.application.name=ms-despacho
server.port=8089

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_despachos?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# URLs de otros microservicios
api.pedidos.url=http://localhost:8084
api.proveedores.url=http://localhost:8082

# Logs
logging.level.duoc.cl.despacho=INFO