version: '3.8'

networks:
  ms-net:
    driver: bridge

services:
  # ── BASE DE DATOS: CATEGORÍAS ──────────────────────────────────────────────
  mi-mysql:
    image: mysql:8.0
    container_name: mi-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_categorias
    volumes:
      - mysql_categoria_data:/var/lib/mysql # Persistencia para categorías
    networks:
      - ms-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M

  # ── BASE DE DATOS: DESPACHOS ───────────────────────────────────────────────
  mi-mysql-despachos:
    image: mysql:8.0
    container_name: mi-mysql-despachos
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_despachos
    volumes:
      - mysql_despacho_data:/var/lib/mysql # Persistencia para despachos
    networks:
      - ms-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M

  # ── MICROSERVICIO DE CATEGORÍAS ───────────────────────────────────────────
  ms-categoria:
    build:
      context: ./categorias
      dockerfile: Dockerfile
    container_name: ms-categoria
    ports:
      - "8090:8090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mi-mysql:3306/db_categorias?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - EUREKA_CLIENT_ENABLED=false
      - SPRING_CLOUD_DISCOVERY_ENABLED=false
    networks:
      - ms-net
    depends_on:
      mi-mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 400M

  # ── MICROSERVICIO DE DESPACHO ──────────────────────────────────────────────
  ms-despacho:
    build:
      context: ./despachos
      dockerfile: Dockerfile
    container_name: ms-despacho
    ports:
      - "8089:8089"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MYSQL_HOST=mi-mysql-despachos
      - MYSQL_DATABASE=db_despachos
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      # Interconexión entre contenedores usando los alias de la red bridge de Docker
      - API_PEDIDOS_URL=http://ms-pedido:8084
      - API_PROVEEDORES_URL=http://ms-proveedor:8082
    networks:
      - ms-net
    depends_on:
      mi-mysql-despachos:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 400M

  # ── API GATEWAY (PÚBLICO) ──────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_ENABLED=false
      - SPRING_CLOUD_DISCOVERY_ENABLED=false

      # VARIABLES DE ENRUTAMIENTO INDEXADAS
      # Ruta 0: Categorías
      - SPRING_CLOUD_GATEWAY_ROUTES_0_ID=ms-categoria
      - SPRING_CLOUD_GATEWAY_ROUTES_0_URI=http://ms-categoria:8090
      - SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0=Path=/api/v1/categorias/**

      # Ruta 1: Despachos
      - SPRING_CLOUD_GATEWAY_ROUTES_1_ID=ms-despacho
      - SPRING_CLOUD_GATEWAY_ROUTES_1_URI=http://ms-despacho:8089
      - SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0=Path=/api/v1/despachos/**
    networks:
      - ms-net
    depends_on:
      - ms-categoria
      - ms-despacho
    deploy:
      resources:
        limits:
          memory: 400M

# Definición de volúmenes independientes para asegurar la persistencia de datos
volumes:
  mysql_categoria_data:
  mysql_despacho_data: